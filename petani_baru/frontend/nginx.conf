server {
    listen 80;
    server_name localhost;

    # Folder tempat file HTML/JS/CSS hasil build React diletakkan
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Penting untuk routing SPA (Single Page Application) React Router
        try_files $uri $uri/ /index.html;
    }

    # Proxy request API ke service backend-app di dalam Docker Network
    location /api/ {
        proxy_pass http://backend-app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
